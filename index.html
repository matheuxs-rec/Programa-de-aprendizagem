<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Experimento de Emoções</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
text-align:center;
}

.container{
background:white;
max-width:900px;
margin:auto;
padding:30px;
border-radius:15px;
margin-top:40px;
box-shadow:0px 10px 20px rgba(0,0,0,0.2);
}

.result{
font-size:22px;
margin:10px;
}

button{
padding:10px 20px;
margin-top:20px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Pergunta da Turma</h1>

<h2 id="pergunta"></h2>

<div id="resultados"></div>

<button onclick="proximaPergunta()">Próxima Pergunta</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyC2tdq0znm2b3eYeaIXtoni3O7Oh5j_WII",
authDomain: "evellyn1414.firebaseapp.com",
databaseURL: "https://evellyn1414-default-rtdb.firebaseio.com",
projectId: "evellyn1414",
storageBucket: "evellyn1414.appspot.com",
messagingSenderId: "739274736954",
appId: "1:739274736954:web:fb58172bdef8b4f3427c03"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let perguntas=[

{
texto:"Quando uma pessoa encontra um perigo inesperado, qual emoção básica costuma surgir primeiro?",
opcoes:["Medo","Raiva","Curiosidade"]
},

{
texto:"Qual dimensão da emoção representa a experiência subjetiva da emoção?",
opcoes:["Sentimentos","Excitação corporal","Expressão social"]
},

{
texto:"Qual dimensão envolve a ativação fisiológica do corpo?",
opcoes:["Excitação corporal","Sentimentos","Memória"]
},

{
texto:"Expressões faciais e gestos fazem parte de qual componente da emoção?",
opcoes:["Componente social-expressivo","Excitação corporal","Componente cognitivo"]
},

{
texto:"Qual dessas é uma emoção social?",
opcoes:["Vergonha","Medo","Surpresa"]
},

{
texto:"O que normalmente desencadeia uma emoção?",
opcoes:["Evento significativo","Pensamento aleatório","Nada específico"]
}

]

let perguntaAtual=0

function mostrarPergunta(){

let p=perguntas[perguntaAtual]

document.getElementById("pergunta").innerText=p.texto

let html=""

p.opcoes.forEach(op=>{

html+=`<div class="result">${op}: <span id="${op}">0</span></div>`

})

document.getElementById("resultados").innerHTML=html

const respostasRef = ref(db,"respostas")

onValue(respostasRef,(snapshot)=>{

let data=snapshot.val()

if(!data) return

p.opcoes.forEach(op=>{

let valor=data[op]||0

let el=document.getElementById(op)

if(el) el.innerText=valor

})

})

}

function proximaPergunta(){

perguntaAtual++

if(perguntaAtual<perguntas.length){

mostrarPergunta()

}else{

document.getElementById("pergunta").innerText="Fim das perguntas"

document.getElementById("resultados").innerHTML=""

}

}

window.proximaPergunta=proximaPergunta

mostrarPergunta()

</script>

</body>
</html>
